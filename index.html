<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="스타크래프트 빠른무한 바이클랜 공식 홈페이지입니다. 레더 매치, 랭킹, 이벤트 등의 정보를 확인하세요.">
  
  <meta property="og:title" content="ByClan - 스타크래프트 빠른무한 공식 길드">
  <meta property="og:description" content="레더 매치, 랭킹, 이벤트 등 바이클랜의 모든 소식을 확인하세요.">
  
  <title>ByClan Main Prototype</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    body { font-family: 'Pretendard', sans-serif; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-200 font-semibold">
  
  <div id="root"></div>

  <script type="text/babel">
    
    // === 1. 로고 컴포넌트 (검정 그림자 적용) ===
    function ByClanLogo() {
      const logoUrl = "https://raw.githubusercontent.com/gkfla0720a/First-Coding-Repository/main/ByLogo.png";
      return (
        <div className="flex items-center justify-center cursor-pointer group w-12 h-12 relative">
          <img 
            src={logoUrl} alt="ByClan Logo" 
            className="w-full h-full object-contain transition-all duration-300 group-hover:scale-110 group-hover:brightness-110"
            style={{ 
              // CSS 필터를 직접 사용하여 오류 없이 두 개의 그림자를 겹칩니다.
              filter: "drop-shadow(0px 3px 2px rgba(0, 0, 0, 0.9)) drop-shadow(0px 0px 12px rgba(0, 0, 0, 0.6))" 
            }}
            onError={(e) => console.error("Image failed to load in React:", e)}
          />
        </div>
      );
    }

    // === 2. 임시 서브 페이지 컴포넌트 (Sub-page Placeholder) ===
    function PagePlaceholder({ title }) {
      return (
        <div className="bg-gray-800 p-10 rounded-xl border border-gray-700 shadow-2xl text-center animate-fade-in-down mt-10">
          <h2 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600 mb-4">
            {title}
          </h2>
          <p className="text-gray-400 text-lg">
            이곳은 <strong className="text-white">{title}</strong> 메뉴의 내용을 넣을 공간입니다.<br/>
            추후 이 영역에 게시판, 갤러리, 텍스트 등 원하는 콘텐츠를 개발하여 넣을 수 있습니다.
          </p>
        </div>
      );
    }

    // === 3. 메인 홈 콘텐츠 컴포넌트 (Main Home Content) ===
    function HomeContent() {
      return (
        <div className="space-y-12 animate-fade-in-down w-full max-w-6xl mx-auto">
          {/* Top 10 랭킹 보드 */}
          <section>
            <h2 className="text-xl font-bold mb-4 text-white">🏆 Top 10 랭킹 보드</h2>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {[1, 2, 3, 4].map(rank => (
                <div key={rank} className="bg-blue-900/80 h-32 rounded-lg flex flex-col items-center justify-center shadow-lg border border-blue-700 transition-transform hover:scale-105 cursor-pointer">
                  <span className="font-bold text-2xl text-yellow-400">{rank}위</span>
                  <span className="text-sm mt-1 text-gray-200">클랜원 이름</span>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mt-4">
              {[5, 6, 7, 8, 9, 10].map(rank => (
                <div key={rank} className="bg-gray-800 h-20 rounded-lg flex flex-col items-center justify-center border border-gray-700 hover:bg-gray-700 transition-colors cursor-pointer">
                  <span className="font-semibold text-gray-300">{rank}위</span>
                  <span className="text-xs text-gray-400 mt-1">클랜원</span>
                </div>
              ))}
            </div>
          </section>

          {/* 이전 시즌 우승자 & 다가오는 이벤트 */}
          <div className="grid md:grid-cols-2 gap-8">
            <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
              <h2 className="text-xl font-bold mb-4 text-white">🏅 이전 시즌 우승자</h2>
              <div className="h-24 flex items-center justify-center bg-gray-900 rounded border border-gray-700">
                <p className="text-gray-400">시즌 1 우승자 정보</p>
              </div>
            </section>
            <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
              <h2 className="text-xl font-bold mb-4 text-white">📅 다가오는 이벤트</h2>
              <div className="h-24 flex items-center justify-center bg-gray-900 rounded border border-gray-700">
                <p className="text-gray-400">다음 내전 일정 안내</p>
              </div>
            </section>
          </div>
        </div>
      );
    }

    // === 5. 공지사항 게시판 컴포넌트 (Notice Board Component) ===
    function NoticeBoard() {
      // 게시판 임시 데이터 (실제 클랜 상황에 맞게 수정 가능)
      const notices = [
        { id: 1, type: '필독', title: '바이클랜 2026년 상반기 통합 랭킹전 안내', author: '운영진', date: '2026.03.28', views: 142 },
        { id: 2, type: '공지', title: '신규 클랜원 가입 조건 및 테스트 안내', author: '길드마스터', date: '2026.03.25', views: 89 },
        { id: 3, type: '이벤트', title: '주말 빠른무한 내전 참여자 포인트 2배 지급', author: '운영진', date: '2026.03.21', views: 215 },
        { id: 4, type: '일반', title: '디스코드 채널 개편 및 역할 부여 안내', author: '관리자', date: '2026.03.18', views: 64 },
        { id: 5, type: '일반', title: '클랜전 진행 시 디스코드 화면 공유 관련 규칙', author: '운영진', date: '2026.03.15', views: 112 },
      ];

      return (
        <div className="w-full max-w-5xl mx-auto animate-fade-in-down mt-8">
          
          {/* 게시판 헤더 영역 */}
          <div className="flex justify-between items-end mb-6">
            <h2 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 drop-shadow-md">
              📢 공지사항
            </h2>
            <button className="px-5 py-2 bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold rounded transition-colors shadow-lg">
              글쓰기
            </button>
          </div>
          
          {/* 게시판 리스트 영역 */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-gray-900/80 text-gray-400 text-sm border-b border-gray-700">
                  <th className="py-4 px-6 font-semibold w-20 text-center">번호</th>
                  <th className="py-4 px-6 font-semibold">제목</th>
                  <th className="py-4 px-6 font-semibold w-32 text-center">작성자</th>
                  <th className="py-4 px-6 font-semibold w-32 text-center">작성일</th>
                  <th className="py-4 px-6 font-semibold w-24 text-center">조회수</th>
                </tr>
              </thead>
              <tbody>
                {notices.map((post) => (
                  <tr key={post.id} className="border-b border-gray-700/50 hover:bg-gray-700/80 transition-colors cursor-pointer group">
                    <td className="py-4 px-6 text-center text-gray-500 font-medium">{post.id}</td>
                    <td className="py-4 px-6 flex items-center">
                      {/* 배지 디자인 (타입별로 색상 다름) */}
                      <span className={`text-xs px-2 py-1 rounded mr-3 font-bold shadow-sm shrink-0
                        ${post.type === '필독' ? 'bg-red-900/60 text-red-400 border border-red-700' : 
                          post.type === '공지' ? 'bg-yellow-900/60 text-yellow-400 border border-yellow-700' : 
                          post.type === '이벤트' ? 'bg-sky-900/60 text-sky-400 border border-sky-700' : 
                          'bg-gray-700 text-gray-300 border border-gray-600'}`}>
                        {post.type}
                      </span>
                      {/* 제목 (마우스 오버 시 금색으로 변경) */}
                      <span className="text-gray-200 group-hover:text-yellow-400 transition-colors font-medium truncate">
                        {post.title}
                      </span>
                    </td>
                    <td className="py-4 px-6 text-center text-sm text-gray-400">{post.author}</td>
                    <td className="py-4 px-6 text-center text-sm text-gray-500">{post.date}</td>
                    <td className="py-4 px-6 text-center text-sm text-gray-500">{post.views}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          
        </div>
      );
    }


    // === 4. 전체 앱 컴포넌트 (App Container) ===
    function ByClanHome() {
      // 상태 이름 변경: hover 상태가 아닌 click 상태임을 명확히 하기 위해 openMenuIndex 사용
      const [openMenuIndex, setOpenMenuIndex] = React.useState(null);
      const [activeView, setActiveView] = React.useState('Home'); 
      const menuRefs = React.useRef([]); 
      const navRef = React.useRef(null); // 네비게이션 영역 참조 (외부 클릭 감지용)

      // ★ 버그 수정: 메뉴 바깥쪽(빈 화면 등)을 클릭하면 열려있던 드롭다운이 닫히도록 하는 기능
      React.useEffect(() => {
        function handleClickOutside(event) {
          if (navRef.current && !navRef.current.contains(event.target)) {
            setOpenMenuIndex(null);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const menuData = [
        { title: '클랜소개', items: ['개요', '목표', '활동 내용', '클랜원', '가입방법'] },
        { title: '랭킹보드', items: ['시즌별 랭킹', '클랜원별 랭킹', '시즌별 우승자'] },
        { title: 'BY레더시스템', items: ['레더 매치', '레더 포인트', '레더 보상 안내'] },
        { title: '클랜대회', items: ['BSL 일정', '토너먼트 일정', '대회 규칙', '대회 결과', '대회 영상'] },
        { title: '커뮤니티', items: ['공지사항', '자유게시판', '클랜원 소식', '이벤트 게시판'] },
        { title: '미디어', items: ['경기 영상', '클랜 활동 영상', '사진 갤러리', '클랜 홍보 영상'] },
        { title: '이벤트', items: ['다가오는 이벤트', '지난 이벤트', '이벤트 참여 방법', '이벤트 결과'] }
      ];

      const getDropdownPlacement = (index) => {
        const menuItem = menuRefs.current[index];
        if (!menuItem) return 'left-0';
        return menuItem.getBoundingClientRect().left + 160 > window.innerWidth ? 'right-0' : 'left-0';
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* 네비게이션 영역 */}
          <nav ref={navRef} className="bg-gray-800 border-b border-gray-700 relative z-50">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
              
              {/* 로고 및 클랜명 영역 (클릭 시 'Home'으로 이동) */}
              <div 
                className="flex items-center gap-3 cursor-pointer group"
                onClick={() => {
                  setActiveView('Home');
                  setOpenMenuIndex(null); // 홈 이동 시 열려있던 메뉴 닫기
                }}
              >
                <ByClanLogo />
                <h1 
                  className="text-3xl font-black tracking-widest shrink-0 transition-all duration-300 group-hover:brightness-110 group-hover:drop-shadow-[0_0_15px_rgba(200,162,102,0.5)]"
                  style={{
                    background: "linear-gradient(155deg, #FFE8C6 0%, #B89C60 20%, #C8A266 40%, #45372A 50%, #5E462E 60%, #B89C60 80%, #2E241C 100%)",
                    WebkitBackgroundClip: "text",
                    WebkitTextFillColor: "transparent",
                    filter: "drop-shadow(0px 1px 0px rgba(200, 162, 102, 0.6)) drop-shadow(0px 2px 1px rgba(0, 0, 0, 0.9)) drop-shadow(0px 3px 2px rgba(0, 0, 0, 0.8))",
                    textShadow: "0px 1px 1px rgba(200, 162, 102, 0.4), 0px 1px 0px rgba(0, 0, 0, 0.3)"
                  }}
                >
                  ByClan
                </h1>
              </div>
              
              {/* 메인 메뉴 영역 */}
              <ul className="flex flex-wrap gap-x-6 gap-y-3 items-center justify-end">
                {menuData.map((menu, index) => (
                  <li key={index} 
                      className="relative" 
                      ref={(el) => menuRefs.current[index] = el}
                      // ★ 버그 수정: onMouseEnter/Leave 제거. 터치 및 클릭 오류 방지.
                  >
                    <button 
                      // ★ 버그 수정: 버튼을 직접 클릭할 때 메뉴가 열리거나 닫히도록(토글) 설정
                      onClick={() => setOpenMenuIndex(openMenuIndex === index ? null : index)}
                      className="text-gray-300 hover:text-white transition-colors duration-200 hover:scale-105"
                    >
                      {menu.title}
                    </button>
                    {/* 드롭다운 하위 메뉴 */}
                    {openMenuIndex === index && (
                      <div className={`absolute top-full mt-3 w-40 bg-gray-800/80 backdrop-blur-lg border border-sky-500/40 rounded-lg shadow-2xl flex flex-col z-50 overflow-hidden ${getDropdownPlacement(index)}`}>
                        {menu.items.map((subItem, subIndex) => (
                          <span 
                            key={subIndex} 
                            onClick={() => {
                              setActiveView(subItem); // 클릭한 하위 메뉴로 뷰 전환
                              setOpenMenuIndex(null); // 클릭 후 메뉴 닫기 (초기화)
                            }}
                            className="px-4 py-3 text-sm text-gray-100 hover:bg-sky-600/50 hover:text-white cursor-pointer transition-colors border-b border-gray-600/50 last:border-none"
                          >
                            {subItem}
                          </span>
                        ))}
                      </div>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          </nav>

          {/* 메인 화면 영상 영역 (Home일 때만 표시) */}
          {activeView === 'Home' && (
            <header className="h-64 bg-black flex items-center justify-center border-b border-gray-700 relative z-10 shadow-inner">
              <p className="text-gray-500">[자동 재생 영상 또는 클랜 대표 이미지 영역]</p>
            </header>
          )}

                   {/* 동적으로 변하는 콘텐츠 영역 */}
          <main className="flex-grow w-full relative z-10 flex flex-col items-center justify-start p-4 md:p-8">
            {activeView === 'Home' ? (
              <HomeContent />
            ) : activeView === '공지사항' ? (
              // '공지사항' 메뉴를 클릭하면 NoticeBoard 컴포넌트 출력
              <NoticeBoard /> 
            ) : (
              // 그 외 아직 안 만든 메뉴들은 Placeholder 출력
              <PagePlaceholder title={activeView} />
            )}
          </main>

          
        </div>
      );
    }


    // 작성한 React 컴포넌트를 실제 화면(#root)에 렌더링
    ReactDOM.render(<ByClanHome />, document.getElementById('root'));
  </script>
</body>
</html>
