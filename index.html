<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="스타크래프트 빠른무한 바이클랜 공식 홈페이지입니다. 레더 매치, 랭킹, 이벤트 등의 정보를 확인하세요.">
  
  <meta property="og:title" content="ByClan - 스타크래프트 빠른무한 공식 길드">
  <meta property="og:description" content="레더 매치, 랭킹, 이벤트 등 바이클랜의 모든 소식을 확인하세요.">
  
  <title>ByClan Main Prototype</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    body { font-family: 'Pretendard', sans-serif; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-200 font-semibold">
  
  <div id="root"></div>

  <script type="text/babel">
    
    // === 깃허브에 업로드된 이미지를 사용하는 로고 컴포넌트 ===
    function ByClanLogo() {
      return (
        <div className="flex items-center justify-center relative cursor-pointer group">
          
          {/* src="./ByClanLogo.png" : 깃허브 리포지토리에 올린 파일 이름과 정확히 일치시켰습니다.
            drop-shadow : 투명 배경 로고의 외곽선을 따라 파란색 네온 효과를 줍니다.
            group-hover : 마우스를 올리면 네온 빛이 더 강해집니다.
          */}
          <img 
            src="./ByClanLogo.png" 
            alt="ByClan Logo" 
            className="w-10 h-10 object-contain transition-all duration-300 drop-shadow-[0_0_8px_rgba(56,189,248,0.7)] group-hover:drop-shadow-[0_0_15px_rgba(56,189,248,1)]"
            // 로고 크기가 텍스트와 더 잘 어울리도록 w-10 h-10으로 살짝 조정했습니다.
          />
          
        </div>
      );
    }

    // === 2. 메인 홈페이지 컴포넌트 (Main Home Component) ===
    function ByClanHome() {
      // 상태 관리 및 참조 (Hover state)
      const [hoveredMenuIndex, setHoveredMenuIndex] = React.useState(null);
      const navRef = React.useRef(null);
      const menuRefs = React.useRef([]); 

      // 데이터 (Menu Data)
      const menuData = [
        { title: '클랜소개', items: ['개요', '목표', '활동 내용', '클랜원', '가입방법'] },
        { title: '랭킹보드', items: ['시즌별 랭킹', '클랜원별 랭킹', '시즌별 우승자'] },
        { title: 'BY레더시스템', items: ['레더 매치', '레더 포인트', '레더 보상 안내'] },
        { title: '클랜대회', items: ['BSL 일정', '토너먼트 일정', '대회 규칙', '대회 결과', '대회 영상'] },
        { title: '커뮤니티', items: ['공지사항', '자유게시판', '클랜원 소식', '이벤트 게시판'] },
        { title: '미디어', items: ['경기 영상', '클랜 활동 영상', '사진 갤러리', '클랜 홍보 영상'] },
        { title: '이벤트', items: ['다가오는 이벤트', '지난 이벤트', '이벤트 참여 방법', '이벤트 결과'] }
      ];

      // 스크롤 넘어감 방지를 위한 JS 기반 위치 계산 함수
      const getDropdownPlacement = (index) => {
        const menuItem = menuRefs.current[index];
        const dropdownWidth = 160; 
        const viewportWidth = window.innerWidth;

        if (!menuItem) return 'left-0';
        const menuItemLeft = menuItem.getBoundingClientRect().left; 

        if (menuItemLeft + dropdownWidth > viewportWidth) {
          return 'right-0';
        }
        return 'left-0';
      };

      return (
        <div className="min-h-screen">
          
          {/* 네비게이션 영역 */}
          <nav ref={navRef} className="bg-gray-800 border-b border-gray-700 relative z-50">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
              
              {/* 로고 및 클랜명 영역 (With New Logo) */}
              <div className="flex items-center gap-3 cursor-pointer">
                <ByClanLogo />
                <h1 className="text-2xl font-bold text-white tracking-wider shrink-0">
                  ByClan
                </h1>
              </div>
              
              {/* 상위 메뉴 (Main menu) - Now uses hover instead of click */}
              <ul className="flex flex-wrap gap-x-6 gap-y-3 items-center justify-end">
                {menuData.map((menu, index) => (
                  <li key={index} 
                      className="relative" 
                      ref={(el) => menuRefs.current[index] = el}
                      // 마우스 오버 시 메뉴 펼침 (Expand on hover)
                      onMouseEnter={() => setHoveredMenuIndex(index)}
                      // 마우스가 나가면 메뉴 닫힘 (Close on mouse out)
                      onMouseLeave={() => setHoveredMenuIndex(null)}
                  >
                    
                    {/* 메뉴 버튼 */}
                    <button 
                      className="text-gray-300 hover:text-white transition-colors duration-200 hover:scale-105"
                    >
                      {menu.title}
                    </button>

                    {/* 하위 메뉴 (글래스모피즘 적용, 투명도 증가) */}
                    {hoveredMenuIndex === index && (
                      <div className={`absolute top-full mt-3 w-40 bg-gray-800/60 backdrop-blur-lg border border-sky-500/40 rounded-lg shadow-2xl flex flex-col z-50 overflow-hidden ${getDropdownPlacement(index)} animate-fade-in-down`}>
                        {menu.items.map((subItem, subIndex) => (
                          <span 
                            key={subIndex} 
                            className="px-4 py-3 text-sm text-gray-100 hover:bg-sky-600/30 hover:text-white cursor-pointer transition-colors border-b border-gray-600/50 last:border-none"
                          >
                            {subItem}
                          </span>
                        ))}
                      </div>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          </nav>

          {/* 메인 화면 자동 재생 비디오 영역 */}
          <header className="h-64 bg-black flex items-center justify-center border-b border-gray-700 relative z-10">
            <p className="text-gray-500">[자동 재생 영상 또는 클랜 대표 이미지 영역]</p>
          </header>

          {/* 콘텐츠 영역 */}
          <main className="max-w-6xl mx-auto px-4 py-8 space-y-12 relative z-10">
            
            {/* Top 10 랭킹 보드 */}
            <section>
              <h2 className="text-xl font-bold mb-4 text-white">🏆 Top 10 랭킹 보드</h2>
              
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[1, 2, 3, 4].map(rank => (
                  <div key={rank} className="bg-blue-900/80 h-32 rounded-lg flex flex-col items-center justify-center shadow-lg border border-blue-700">
                    <span className="font-bold text-2xl text-yellow-400">{rank}위</span>
                    <span className="text-sm mt-1">클랜원 이름</span>
                  </div>
                ))}
              </div>
              
              <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mt-4">
                {[5, 6, 7, 8, 9, 10].map(rank => (
                  <div key={rank} className="bg-gray-800 h-20 rounded-lg flex flex-col items-center justify-center border border-gray-700">
                    <span className="font-semibold text-gray-300">{rank}위</span>
                    <span className="text-xs text-gray-400 mt-1">클랜원</span>
                  </div>
                ))}
              </div>
            </section>

            {/* 이전 시즌 우승자 & 다가오는 이벤트 */}
            <div className="grid md:grid-cols-2 gap-8">
              <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 className="text-xl font-bold mb-4 text-white">🏅 이전 시즌 우승자</h2>
                <div className="h-24 flex items-center justify-center bg-gray-900 rounded">
                  <p className="text-gray-400">시즌 1 우승자 정보</p>
                </div>
              </section>
              
              <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 className="text-xl font-bold mb-4 text-white">📅 다가오는 이벤트</h2>
                <div className="h-24 flex items-center justify-center bg-gray-900 rounded">
                  <p className="text-gray-400">다음 내전 일정 안내</p>
                </div>
              </section>
            </div>

          </main>
        </div>
      );
    }

    // 작성한 React 컴포넌트를 실제 화면(#root)에 렌더링
    ReactDOM.render(<ByClanHome />, document.getElementById('root'));
  </script>
</body>
</html>
