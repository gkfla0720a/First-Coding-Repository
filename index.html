<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByClan Main Prototype</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 부드러운 폰트 적용 */
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    function ByClanHome() {
      // 1. 상태 관리 및 참조 (State and Refs)
      const [openSubMenu, setOpenSubMenu] = React.useState(null);
      const navRef = React.useRef(null);

      // 2. 외부 클릭 시 메뉴 닫기 (Close menu on outside click)
      React.useEffect(() => {
        function handleClickOutside(event) {
          if (navRef.current && !navRef.current.contains(event.target)) {
            setOpenSubMenu(null);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => {
          document.removeEventListener("mousedown", handleClickOutside);
        };
      }, []);

      // 3. 메뉴 데이터 (Menu Data)
      const menuData = [
        { title: '클랜소개', items: ['개요', '목표', '활동 내용', '클랜원', '가입방법'] },
        { title: '랭킹보드', items: ['시즌별 랭킹', '클랜원별 랭킹', '시즌별 우승자'] },
        { title: 'BY레더시스템', items: ['레더 매치', '레더 포인트', '레더 보상 안내'] },
        { title: '클랜대회', items: ['BSL 일정', '토너먼트 일정', '대회 규칙', '대회 결과', '대회 영상'] },
        { title: '커뮤니티', items: ['공지사항', '자유게시판', '클랜원 소식', '이벤트 게시판'] },
        { title: '미디어', items: ['경기 영상', '클랜 활동 영상', '사진 갤러리', '클랜 홍보 영상'] },
        { title: '이벤트', items: ['다가오는 이벤트', '지난 이벤트', '이벤트 참여 방법', '이벤트 결과'] }
      ];

      const toggleSubMenu = (index) => {
        setOpenSubMenu(openSubMenu === index ? null : index);
      };

      return (
        <div className="min-h-screen">
          
          {/* === 네비게이션 영역 === */}
          <nav ref={navRef} className="bg-gray-800 border-b border-gray-700 relative z-50">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center">
              
              {/* 로고 (Logo) */}
              <h1 className="text-2xl font-bold text-white tracking-wider cursor-pointer mr-8 shrink-0">
                ByClan
              </h1>
              
              {/* 상위 메뉴: 가로 스크롤 제거, flex-wrap으로 자연스러운 줄바꿈 허용 (Main menu: removed horizontal scroll, added flex-wrap) */}
              <ul className="flex flex-wrap gap-x-6 gap-y-3 w-full items-center">
                {menuData.map((menu, index) => (
                  <li key={index} className="relative">
                    
                    {/* 상위 메뉴 항목 (Main menu item) */}
                    <button 
                      onClick={() => toggleSubMenu(index)}
                      className={`flex items-center gap-1 transition-colors duration-200 hover:scale-105 ${openSubMenu === index ? 'text-white font-bold' : 'text-gray-300 hover:text-blue-400'}`}
                    >
                      {menu.title}
                      <span className="text-xs ml-1">{openSubMenu === index ? '▲' : '▼'}</span>
                    </button>

                    {/* 하위 메뉴: 스크롤 감옥에서 탈출하여 컨텐츠 위에 완벽하게 뜸 (Sub-menu: escaped the scroll prison, floats perfectly over content) */}
                    {openSubMenu === index && (
                      <div className="absolute top-full left-0 mt-3 w-40 bg-gray-800 border border-gray-600 rounded-lg shadow-2xl flex flex-col z-50 overflow-hidden">
                        {menu.items.map((subItem, subIndex) => (
                          <span 
                            key={subIndex} 
                            className="px-4 py-3 text-sm text-gray-300 hover:bg-gray-600 hover:text-white cursor-pointer transition-colors border-b border-gray-700 last:border-none"
                          >
                            {subItem}
                          </span>
                        ))}
                      </div>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          </nav>

          {/* === 메인 화면 자동 재생 비디오 영역 === */}
          <header className="h-64 bg-black flex items-center justify-center border-b border-gray-700 relative z-10">
            <p className="text-gray-500">[자동 재생 영상 또는 클랜 대표 이미지 영역]</p>
          </header>

          {/* === 콘텐츠 영역 === */}
          <main className="max-w-6xl mx-auto px-4 py-8 space-y-12 relative z-10">
            
            {/* Top 10 랭킹 보드 */}
            <section>
              <h2 className="text-xl font-bold mb-4 text-white">🏆 Top 10 랭킹 보드</h2>
              
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[1, 2, 3, 4].map(rank => (
                  <div key={rank} className="bg-blue-900/80 h-32 rounded-lg flex flex-col items-center justify-center shadow-lg border border-blue-700">
                    <span className="font-bold text-2xl text-yellow-400">{rank}위</span>
                    <span className="text-sm mt-1">클랜원 이름</span>
                  </div>
                ))}
              </div>
              
              <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mt-4">
                {[5, 6, 7, 8, 9, 10].map(rank => (
                  <div key={rank} className="bg-gray-800 h-20 rounded-lg flex flex-col items-center justify-center border border-gray-700">
                    <span className="font-semibold text-gray-300">{rank}위</span>
                    <span className="text-xs text-gray-400 mt-1">클랜원</span>
                  </div>
                ))}
              </div>
            </section>

            {/* 이전 시즌 우승자 & 다가오는 이벤트 */}
            <div className="grid md:grid-cols-2 gap-8">
              <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 className="text-xl font-bold mb-4 text-white">🏅 이전 시즌 우승자</h2>
                <div className="h-24 flex items-center justify-center bg-gray-900 rounded">
                  <p className="text-gray-400">시즌 1 우승자 정보</p>
                </div>
              </section>
              
              <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 className="text-xl font-bold mb-4 text-white">📅 다가오는 이벤트</h2>
                <div className="h-24 flex items-center justify-center bg-gray-900 rounded">
                  <p className="text-gray-400">다음 내전 일정 안내</p>
                </div>
              </section>
            </div>

          </main>
        </div>
      );
    }

    // 작성한 리액트 컴포넌트를 id가 root인 div 태그 안에 밀어 넣습니다.
    ReactDOM.render(<ByClanHome />, document.getElementById('root'));
  </script>
</body>
</html>
