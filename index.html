<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByClan Main Prototype</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 부드러운 폰트 적용 */
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    function ByClanHome() {
      // 메뉴가 열려있는지 닫혀있는지 기억하는 상태 값 (기본값: false)
      const [isNavOpen, setIsNavOpen] = React.useState(false);

      return (
        <div className="min-h-screen">
          
          {/* 1. 네비게이션 바 (확장 메뉴 애니메이션) */}
          <nav className="bg-gray-800 border-b border-gray-700">
            <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
              <h1 className="text-2xl font-bold text-white tracking-wider">ByClan</h1>
              <button 
                onClick={() => setIsNavOpen(!isNavOpen)} 
                className="focus:outline-none text-gray-300 hover:text-white"
              >
                메뉴 {isNavOpen ? '▲' : '▼'}
              </button>
            </div>
            
            {/* 메뉴 버튼을 눌렀을 때만 아래 내용이 보입니다 */}
            {isNavOpen && (
              <div className="bg-gray-700 px-4 py-4 transition-all duration-300 ease-in-out">
                <ul className="space-y-4 text-center font-medium">
                  <li className="hover:text-blue-400 cursor-pointer">클랜 소개</li>
                  <li className="hover:text-blue-400 cursor-pointer">랭킹 보드</li>
                  <li className="hover:text-blue-400 cursor-pointer">이전 시즌 우승자</li>
                  <li className="hover:text-blue-400 cursor-pointer">다가오는 이벤트</li>
                </ul>
              </div>
            )}
          </nav>

          {/* 2. 메인 화면 자동 재생 비디오 영역 */}
          <header className="h-64 bg-black flex items-center justify-center border-b border-gray-700">
            <p className="text-gray-500">[자동 재생 영상 또는 클랜 대표 이미지 영역]</p>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 space-y-12">
            
            {/* 3. Top 10 랭킹 보드 (가로 스크롤 제거, 그리드 분리형) */}
            <section>
              <h2 className="text-xl font-bold mb-4 text-white">🏆 Top 10 랭킹 보드</h2>
              
              {/* 상위 1~4위 (큰 그리드) */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[1, 2, 3, 4].map(rank => (
                  <div key={rank} className="bg-blue-900/80 h-32 rounded-lg flex flex-col items-center justify-center shadow-lg border border-blue-700">
                    <span className="font-bold text-2xl text-yellow-400">{rank}위</span>
                    <span className="text-sm mt-1">클랜원 이름</span>
                  </div>
                ))}
              </div>
              
              {/* 중위 5~10위 (작은 그리드) */}
              <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mt-4">
                {[5, 6, 7, 8, 9, 10].map(rank => (
                  <div key={rank} className="bg-gray-800 h-20 rounded-lg flex flex-col items-center justify-center border border-gray-700">
                    <span className="font-semibold text-gray-300">{rank}위</span>
                    <span className="text-xs text-gray-400 mt-1">클랜원</span>
                  </div>
                ))}
              </div>
            </section>

            {/* 4. 이전 시즌 우승자 & 다가오는 이벤트 */}
            <div className="grid md:grid-cols-2 gap-8">
              <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 className="text-xl font-bold mb-4 text-white">🏅 이전 시즌 우승자</h2>
                <div className="h-24 flex items-center justify-center bg-gray-900 rounded">
                  <p className="text-gray-400">시즌 1 우승자 정보</p>
                </div>
              </section>
              
              <section className="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 className="text-xl font-bold mb-4 text-white">📅 다가오는 이벤트</h2>
                <div className="h-24 flex items-center justify-center bg-gray-900 rounded">
                  <p className="text-gray-400">다음 내전 일정 안내</p>
                </div>
              </section>
            </div>

          </main>
        </div>
      );
    }

    // 작성한 리액트 컴포넌트를 id가 root인 div 태그 안에 밀어 넣습니다.
    ReactDOM.render(<ByClanHome />, document.getElementById('root'));
  </script>
</body>
</html>
