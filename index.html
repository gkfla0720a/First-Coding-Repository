<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

  <meta name="description" content="스타크래프트 빠른무한 바이클랜 공식 홈페이지입니다. 레더 매치, 랭킹, 이벤트 등의 정보를 확인하세요.">
  
  <meta property="og:title" content="ByClan - 스타크래프트 빠른무한 공식 길드">
  <meta property="og:description" content="레더 매치, 랭킹, 이벤트 등 바이클랜의 모든 소식을 확인하세요.">
  
  <title>ByClan Main Prototype</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    body { font-family: 'Pretendard', sans-serif; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-200 font-semibold">
  
  <div id="root"></div>

  <script type="text/babel">
    
    // === 1. 로고 컴포넌트 (검정 그림자 적용) ===
    function ByClanLogo() {
      const logoUrl = "https://raw.githubusercontent.com/gkfla0720a/First-Coding-Repository/main/ByLogo.png";
      return (
        <div className="flex items-center justify-center cursor-pointer group w-12 h-12 relative">
          <img 
            src={logoUrl} alt="ByClan Logo" 
            className="w-full h-full object-contain transition-all duration-300 group-hover:scale-110 group-hover:brightness-110"
            style={{ 
              // CSS 필터를 직접 사용하여 오류 없이 두 개의 그림자를 겹칩니다.
              filter: "drop-shadow(0px 3px 2px rgba(0, 0, 0, 0.9)) drop-shadow(0px 0px 12px rgba(0, 0, 0, 0.6))" 
            }}
            onError={(e) => console.error("Image failed to load in React:", e)}
          />
        </div>
      );
    }

    // === 2. 임시 서브 페이지 컴포넌트 (Sub-page Placeholder) ===
    function PagePlaceholder({ title }) {
      return (
        <div className="bg-gray-800 p-10 rounded-xl border border-gray-700 shadow-2xl text-center animate-fade-in-down mt-10">
          <h2 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600 mb-4">
            {title}
          </h2>
          <p className="text-gray-400 text-lg">
            이곳은 <strong className="text-white">{title}</strong> 메뉴의 내용을 넣을 공간입니다.<br/>
            추후 이 영역에 게시판, 갤러리, 텍스트 등 원하는 콘텐츠를 개발하여 넣을 수 있습니다.
          </p>
        </div>
      );
    }

    // === 3. 메인 홈 콘텐츠 컴포넌트 (Main Home Content) ===
        // === 3. 메인 홈 콘텐츠 컴포넌트 (프리미엄 대시보드 업그레이드) ===
    function HomeContent() {
      // 대시보드용 임시 미리보기 데이터 (Top 3 및 최근 공지)
      const topRankers = [
        { rank: 1, name: 'By_Slayer', points: 2150 },
        { rank: 2, name: 'By_Flash', points: 2080 },
        { rank: 3, name: 'By_Zergling', points: 1950 },
      ];
      
      const recentNotices = [
        { id: 1, type: '필독', title: '바이클랜 2026년 상반기 통합 랭킹전 안내', date: '03.28' },
        { id: 2, type: '공지', title: '신규 클랜원 가입 조건 및 테스트 안내', date: '03.25' },
        { id: 3, type: '이벤트', title: '주말 빠른무한 내전 참여자 포인트 2배', date: '03.21' },
      ];

      return (
        <div className="w-full max-w-5xl mx-auto space-y-6 sm:space-y-8 animate-fade-in-down mt-4 sm:mt-8">
          
          {/* 1. 메인 히어로 배너 (Hero Section) */}
          <section className="relative bg-gray-900 rounded-2xl overflow-hidden border border-gray-700 shadow-2xl h-64 sm:h-80 flex flex-col items-center justify-center text-center group">
             {/* 배경 이미지 (어두운 오버레이 포함) */}
             <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-20 group-hover:opacity-30 transition-opacity duration-700"></div>
             <div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/60 to-transparent"></div>
             
             {/* 배너 텍스트 및 버튼 */}
             <div className="relative z-10 px-4">
               <span className="text-yellow-500 font-bold tracking-widest text-xs sm:text-sm mb-2 block">STARCRAFT FAST INFINITE CLAN</span>
               <h2 className="text-3xl sm:text-5xl font-black text-white mb-4 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                 Welcome to <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600">ByClan</span>
               </h2>
               <p className="text-gray-300 max-w-xl mx-auto text-xs sm:text-base mb-6 hidden sm:block">
                 전통과 실력을 자랑하는 최고의 스타크래프트 빠른무한 길드.<br/>지금 바로 래더에 참여하고 당신의 실력을 증명하세요!
               </p>
               <button className="px-5 py-2 sm:px-6 sm:py-2.5 bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-gray-900 text-sm sm:text-base font-bold rounded-full shadow-[0_0_15px_rgba(234,179,8,0.4)] transition-all transform hover:scale-105">
                 가입 신청하기
               </button>
             </div>
          </section>

          {/* 2. 대시보드 하단 그리드 (랭킹 미리보기 & 공지사항 미리보기) */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            {/* 좌측: 명예의 전당 (Top 3) */}
            <section className="bg-gray-800 p-5 sm:p-6 rounded-xl border border-gray-700 shadow-xl flex flex-col hover:border-gray-600 transition-colors">
              <div className="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                <h3 className="text-lg sm:text-xl font-bold text-white flex items-center gap-2">
                  <span>🏆</span> 명예의 전당
                </h3>
                <button className="text-xs text-sky-400 hover:text-sky-300 transition-colors">자세히 보기 &gt;</button>
              </div>
              <div className="flex-grow flex flex-col justify-center space-y-3">
                {topRankers.map((player) => (
                  <div key={player.rank} className="flex items-center justify-between bg-gray-900/50 p-3 rounded-lg border border-gray-700/50 hover:border-yellow-500/30 transition-colors cursor-pointer">
                    <div className="flex items-center gap-3">
                      <span className={`w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded-full font-bold text-xs sm:text-sm shadow-inner
                        ${player.rank === 1 ? 'bg-yellow-500 text-gray-900' : 
                          player.rank === 2 ? 'bg-gray-400 text-gray-900' : 
                          'bg-amber-700 text-white'}`}>
                        {player.rank}
                      </span>
                      <span className="font-semibold text-gray-200 text-sm sm:text-base">{player.name}</span>
                    </div>
                    <span className="font-bold text-sky-400 text-sm sm:text-base">{player.points} P</span>
                  </div>
                ))}
              </div>
            </section>

            {/* 우측: 최근 클랜 소식 */}
            <section className="bg-gray-800 p-5 sm:p-6 rounded-xl border border-gray-700 shadow-xl flex flex-col hover:border-gray-600 transition-colors">
              <div className="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                <h3 className="text-lg sm:text-xl font-bold text-white flex items-center gap-2">
                  <span>📢</span> 최근 클랜 소식
                </h3>
                <button className="text-xs text-sky-400 hover:text-sky-300 transition-colors">더보기 &gt;</button>
              </div>
              <div className="flex-grow flex flex-col justify-center space-y-2 sm:space-y-3">
                {recentNotices.map((notice) => (
                  <div key={notice.id} className="flex items-center justify-between p-2 hover:bg-gray-700/50 rounded transition-colors cursor-pointer group">
                    <div className="flex items-center gap-2 overflow-hidden">
                      <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold shrink-0
                        ${notice.type === '필독' ? 'bg-red-900/60 text-red-400 border border-red-700/50' : 
                          notice.type === '이벤트' ? 'bg-sky-900/60 text-sky-400 border border-sky-700/50' : 
                          'bg-gray-700 text-gray-300 border border-gray-600/50'}`}>
                        {notice.type}
                      </span>
                      <span className="text-sm text-gray-300 group-hover:text-yellow-400 transition-colors truncate">
                        {notice.title}
                      </span>
                    </div>
                    <span className="text-xs text-gray-500 shrink-0 ml-2">{notice.date}</span>
                  </div>
                ))}
              </div>
            </section>

          </div>
        </div>
      );
    }


        // === 5. 공지사항 게시판 컴포넌트 (모바일 반응형 완벽 적용) ===
    function NoticeBoard() {
      const notices = [
        { id: 1, type: '필독', title: '바이클랜 2026년 상반기 통합 랭킹전 안내', author: '운영진', date: '2026.03.28', views: 142 },
        { id: 2, type: '공지', title: '신규 클랜원 가입 조건 및 테스트 안내', author: '길드마스터', date: '2026.03.25', views: 89 },
        { id: 3, type: '이벤트', title: '주말 빠른무한 내전 참여자 포인트 2배 지급', author: '운영진', date: '2026.03.21', views: 215 },
        { id: 4, type: '일반', title: '디스코드 채널 개편 및 역할 부여 안내', author: '관리자', date: '2026.03.18', views: 64 },
        { id: 5, type: '일반', title: '클랜전 진행 시 디스코드 화면 공유 관련 규칙', author: '운영진', date: '2026.03.15', views: 112 },
      ];

      return (
        <div className="w-full max-w-5xl mx-auto animate-fade-in-down mt-4 sm:mt-8">
          
          {/* 게시판 헤더 영역 */}
          <div className="flex justify-between items-end mb-4 sm:mb-6 px-2 sm:px-0">
            <h2 className="text-xl sm:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 drop-shadow-md">
              📢 공지사항
            </h2>
            <button className="px-4 py-1.5 sm:px-5 sm:py-2 bg-sky-600 hover:bg-sky-500 text-white text-xs sm:text-sm font-semibold rounded transition-colors shadow-lg">
              글쓰기
            </button>
          </div>
          
          {/* 게시판 리스트 영역 */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-gray-900/80 text-gray-400 text-xs sm:text-sm border-b border-gray-700">
                  <th className="py-3 px-2 sm:py-4 sm:px-6 font-semibold w-12 sm:w-20 text-center">번호</th>
                  <th className="py-3 px-4 sm:py-4 sm:px-6 font-semibold">제목</th>
                  {/* hidden md:table-cell을 사용하여 모바일에서는 숨김 처리 */}
                  <th className="py-3 px-6 font-semibold w-24 text-center hidden md:table-cell">작성자</th>
                  <th className="py-3 px-6 font-semibold w-28 text-center hidden sm:table-cell">작성일</th>
                  <th className="py-3 px-6 font-semibold w-20 text-center hidden md:table-cell">조회수</th>
                </tr>
              </thead>
              <tbody>
                {notices.map((post) => (
                  <tr key={post.id} className="border-b border-gray-700/50 hover:bg-gray-700/80 transition-colors cursor-pointer group">
                    
                    {/* 1. 번호 */}
                    <td className="py-3 px-2 sm:py-4 sm:px-6 text-center text-gray-500 font-medium text-xs sm:text-base">
                      {post.id}
                    </td>
                    
                    {/* 2. 제목 (모바일 화면 최적화) */}
                    <td className="py-3 px-4 sm:py-4 sm:px-6">
                      <div className="flex flex-col sm:flex-row sm:items-center gap-2">
                        {/* 배지 */}
                        <span className={`text-[10px] sm:text-xs px-2 py-0.5 sm:py-1 rounded font-bold shadow-sm w-max shrink-0
                          ${post.type === '필독' ? 'bg-red-900/60 text-red-400 border border-red-700' : 
                            post.type === '공지' ? 'bg-yellow-900/60 text-yellow-400 border border-yellow-700' : 
                            post.type === '이벤트' ? 'bg-sky-900/60 text-sky-400 border border-sky-700' : 
                            'bg-gray-700 text-gray-300 border border-gray-600'}`}>
                          {post.type}
                        </span>
                        {/* 제목 텍스트 (줄바꿈 방지 완화) */}
                        <span className="text-gray-200 group-hover:text-yellow-400 transition-colors font-medium text-sm sm:text-base break-keep leading-tight">
                          {post.title}
                        </span>
                      </div>
                      
                      {/* ★ 모바일용 추가 정보: 화면이 좁을 때만 제목 아래에 작성자/날짜가 나타납니다 (sm:hidden) */}
                      <div className="mt-2 text-[11px] text-gray-500 flex gap-2 sm:hidden items-center">
                        <span>{post.author}</span>
                        <span>|</span>
                        <span>{post.date}</span>
                        <span>|</span>
                        <span>조회 {post.views}</span>
                      </div>
                    </td>
                    
                    {/* 3. 데스크탑/태블릿용 컬럼 (모바일에서는 숨겨짐) */}
                    <td className="py-4 px-6 text-center text-sm text-gray-400 hidden md:table-cell">{post.author}</td>
                    <td className="py-4 px-6 text-center text-sm text-gray-500 hidden sm:table-cell">{post.date}</td>
                    <td className="py-4 px-6 text-center text-sm text-gray-500 hidden md:table-cell">{post.views}</td>
                    
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          
        </div>
      );
    }

    // === 6. 랭킹 보드 컴포넌트 (Ranking Board Component) ===
    function RankingBoard() {
      // 랭킹 임시 데이터 (종족, 포인트, 승률 포함)
      const rankings = [
        { rank: 1, name: 'By_Slayer', points: 2150, race: 'Terran', winRate: '72%' },
        { rank: 2, name: 'By_Flash', points: 2080, race: 'Protoss', winRate: '68%' },
        { rank: 3, name: 'By_Zergling', points: 1950, race: 'Zerg', winRate: '65%' },
        { rank: 4, name: 'By_Marine', points: 1820, race: 'Terran', winRate: '61%' },
        { rank: 5, name: 'By_Zealot', points: 1790, race: 'Protoss', winRate: '59%' },
        { rank: 6, name: 'By_Hydra', points: 1750, race: 'Zerg', winRate: '58%' },
        { rank: 7, name: 'By_Ghost', points: 1680, race: 'Terran', winRate: '55%' },
        { rank: 8, name: 'By_Dragoon', points: 1620, race: 'Protoss', winRate: '54%' },
        { rank: 9, name: 'By_Mutal', points: 1590, race: 'Zerg', winRate: '52%' },
        { rank: 10, name: 'By_Goliath', points: 1550, race: 'Terran', winRate: '51%' },
      ];

      return (
        <div className="w-full max-w-5xl mx-auto animate-fade-in-down mt-4 sm:mt-8">
          
          <div className="flex justify-between items-end mb-6 px-2 sm:px-0">
            <h2 className="text-xl sm:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 drop-shadow-md">
              🏆 시즌 통합 랭킹 (Top 10)
            </h2>
            <span className="text-gray-400 text-xs sm:text-sm font-medium">2026년 상반기 기준</span>
          </div>

          {/* === Top 3 포디움 (카드 형식) === */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-4 mb-8 pt-4">
            {rankings.slice(0, 3).map((player) => (
              <div key={player.rank} className={`relative bg-gray-800 rounded-xl border p-6 flex flex-col items-center shadow-xl transition-transform hover:-translate-y-2 cursor-pointer
                ${player.rank === 1 ? 'border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.2)] md:-translate-y-4' : 
                  player.rank === 2 ? 'border-gray-400 shadow-[0_0_15px_rgba(156,163,175,0.2)]' : 
                  'border-amber-700 shadow-[0_0_15px_rgba(180,83,9,0.2)]'}`}>
                
                {/* 등수 뱃지 (왕관 느낌) */}
                <div className={`absolute -top-5 w-12 h-12 rounded-full flex items-center justify-center font-black text-2xl shadow-lg border-2 border-gray-900
                  ${player.rank === 1 ? 'bg-gradient-to-br from-yellow-300 to-yellow-600 text-white' : 
                    player.rank === 2 ? 'bg-gradient-to-br from-gray-300 to-gray-500 text-white' : 
                    'bg-gradient-to-br from-amber-500 to-amber-700 text-white'}`}>
                  {player.rank}
                </div>
                
                <h3 className="text-2xl font-bold text-white mt-4">{player.name}</h3>
                <span className="text-sm text-gray-400 mt-1">{player.race}</span>
                
                <div className="w-full h-px bg-gray-700 my-4"></div>
                
                <div className="flex justify-between w-full text-sm">
                  <span className="text-gray-400">래더 포인트</span>
                  <span className="font-bold text-sky-400 text-base">{player.points} P</span>
                </div>
                <div className="flex justify-between w-full text-sm mt-2">
                  <span className="text-gray-400">승률</span>
                  <span className="font-bold text-emerald-400">{player.winRate}</span>
                </div>
              </div>
            ))}
          </div>

          {/* === 4~10위 리스트 (모바일 반응형 테이블) === */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-gray-900/80 text-gray-400 text-sm border-b border-gray-700">
                  <th className="py-3 px-4 sm:py-4 sm:px-6 font-semibold w-16 text-center">순위</th>
                  <th className="py-3 px-4 sm:py-4 sm:px-6 font-semibold">닉네임</th>
                  <th className="py-3 px-4 sm:py-4 sm:px-6 font-semibold text-center hidden sm:table-cell">종족</th>
                  <th className="py-3 px-4 sm:py-4 sm:px-6 font-semibold text-center w-24 sm:w-32">포인트</th>
                  <th className="py-3 px-4 sm:py-4 sm:px-6 font-semibold text-center hidden sm:table-cell w-24">승률</th>
                </tr>
              </thead>
              <tbody>
                {rankings.slice(3).map((player) => (
                  <tr key={player.rank} className="border-b border-gray-700/50 hover:bg-gray-700/80 transition-colors">
                    <td className="py-3 px-4 sm:py-4 sm:px-6 text-center text-gray-400 font-bold">{player.rank}</td>
                    <td className="py-3 px-4 sm:py-4 sm:px-6 font-medium text-gray-200">
                      <div className="flex flex-col sm:flex-row gap-1 sm:items-center">
                        <span className="text-sm sm:text-base">{player.name}</span>
                        {/* 모바일 전용 부가 정보 */}
                        <span className="text-[11px] text-gray-500 sm:hidden">{player.race} | 승률 {player.winRate}</span>
                      </div>
                    </td>
                    <td className="py-3 px-4 sm:py-4 sm:px-6 text-center text-sm text-gray-400 hidden sm:table-cell">{player.race}</td>
                    <td className="py-3 px-4 sm:py-4 sm:px-6 text-center font-bold text-sky-400 text-sm sm:text-base">{player.points}</td>
                    <td className="py-3 px-4 sm:py-4 sm:px-6 text-center text-sm text-emerald-400 hidden sm:table-cell">{player.winRate}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          
        </div>
      );
    }

    // === 7. 클랜 소개 (개요) 컴포넌트 ===
    function ClanOverview() {
      return (
        <div className="w-full max-w-5xl mx-auto animate-fade-in-down mt-4 sm:mt-8 space-y-6 sm:space-y-8">
          
          {/* 타이틀 및 메인 배너 (Hero Section) */}

              {/* 1위 */}
              <div className="bg-gray-800/80 p-5 rounded-lg border border-yellow-500/30 text-center flex flex-col items-center hover:bg-gray-700 transition-colors">

    // === 4. 전체 앱 컴포넌트 (App Container) ===
    function ByClanHome() {
      // 상태 이름 변경: hover 상태가 아닌 click 상태임을 명확히 하기 위해 openMenuIndex 사용
      const [openMenuIndex, setOpenMenuIndex] = React.useState(null);
      const [activeView, setActiveView] = React.useState('Home'); 
      const menuRefs = React.useRef([]); 
      const navRef = React.useRef(null); // 네비게이션 영역 참조 (외부 클릭 감지용)

      // ★ 버그 수정: 메뉴 바깥쪽(빈 화면 등)을 클릭하면 열려있던 드롭다운이 닫히도록 하는 기능
      React.useEffect(() => {
        function handleClickOutside(event) {
          if (navRef.current && !navRef.current.contains(event.target)) {
            setOpenMenuIndex(null);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const menuData = [
        { title: '클랜소개', items: ['개요', '목표', '활동 내용', '클랜원', '가입방법'] },
        { title: '랭킹보드', items: ['시즌별 랭킹', '클랜원별 랭킹', '시즌별 우승자'] },
        { title: 'BY레더시스템', items: ['레더 매치', '레더 포인트', '레더 보상 안내'] },
        { title: '클랜대회', items: ['BSL 일정', '토너먼트 일정', '대회 규칙', '대회 결과', '대회 영상'] },
        { title: '커뮤니티', items: ['공지사항', '자유게시판', '클랜원 소식', '이벤트 게시판'] },
        { title: '미디어', items: ['경기 영상', '클랜 활동 영상', '사진 갤러리', '클랜 홍보 영상'] },
        { title: '이벤트', items: ['다가오는 이벤트', '지난 이벤트', '이벤트 참여 방법', '이벤트 결과'] }
      ];

      const getDropdownPlacement = (index) => {
        const menuItem = menuRefs.current[index];
        if (!menuItem) return 'left-0';
        return menuItem.getBoundingClientRect().left + 160 > window.innerWidth ? 'right-0' : 'left-0';
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* 네비게이션 영역 */}
          <nav ref={navRef} className="bg-gray-800 border-b border-gray-700 relative z-50">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
              
              {/* 로고 및 클랜명 영역 (클릭 시 'Home'으로 이동) */}
              <div 
                className="flex items-center gap-3 cursor-pointer group"
                onClick={() => {
                  setActiveView('Home');
                  setOpenMenuIndex(null); // 홈 이동 시 열려있던 메뉴 닫기
                }}
              >
                <ByClanLogo />
                <h1 
                  className="text-3xl font-black tracking-widest shrink-0 transition-all duration-300 group-hover:brightness-110 group-hover:drop-shadow-[0_0_15px_rgba(200,162,102,0.5)]"
                  style={{
                    background: "linear-gradient(155deg, #FFE8C6 0%, #B89C60 20%, #C8A266 40%, #45372A 50%, #5E462E 60%, #B89C60 80%, #2E241C 100%)",
                    WebkitBackgroundClip: "text",
                    WebkitTextFillColor: "transparent",
                    filter: "drop-shadow(0px 1px 0px rgba(200, 162, 102, 0.6)) drop-shadow(0px 2px 1px rgba(0, 0, 0, 0.9)) drop-shadow(0px 3px 2px rgba(0, 0, 0, 0.8))",
                    textShadow: "0px 1px 1px rgba(200, 162, 102, 0.4), 0px 1px 0px rgba(0, 0, 0, 0.3)"
                  }}
                >
                  ByClan
                </h1>
              </div>
              
              {/* 메인 메뉴 영역 */}
              <ul className="flex flex-wrap gap-x-6 gap-y-3 items-center justify-end">
                {menuData.map((menu, index) => (
                  <li key={index} 
                      className="relative" 
                      ref={(el) => menuRefs.current[index] = el}
                      // ★ 버그 수정: onMouseEnter/Leave 제거. 터치 및 클릭 오류 방지.
                  >
                    <button 
                      // ★ 버그 수정: 버튼을 직접 클릭할 때 메뉴가 열리거나 닫히도록(토글) 설정
                      onClick={() => setOpenMenuIndex(openMenuIndex === index ? null : index)}
                      className="text-gray-300 hover:text-white transition-colors duration-200 hover:scale-105"
                    >
                      {menu.title}
                    </button>
                    {/* 드롭다운 하위 메뉴 */}
                    {openMenuIndex === index && (
                      <div className={`absolute top-full mt-3 w-40 bg-gray-800/80 backdrop-blur-lg border border-sky-500/40 rounded-lg shadow-2xl flex flex-col z-50 overflow-hidden ${getDropdownPlacement(index)}`}>
                        {menu.items.map((subItem, subIndex) => (
                          <span 
                            key={subIndex} 
                            onClick={() => {
                              setActiveView(subItem); // 클릭한 하위 메뉴로 뷰 전환
                              setOpenMenuIndex(null); // 클릭 후 메뉴 닫기 (초기화)
                            }}
                            className="px-4 py-3 text-sm text-gray-100 hover:bg-sky-600/50 hover:text-white cursor-pointer transition-colors border-b border-gray-600/50 last:border-none"
                          >
                            {subItem}
                          </span>
                        ))}
                      </div>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          </nav>

          {/* 메인 화면 영상 영역 (Home일 때만 표시) */}
          {activeView === 'Home' && (
            <header className="h-64 bg-black flex items-center justify-center border-b border-gray-700 relative z-10 shadow-inner">
              <p className="text-gray-500">[자동 재생 영상 또는 클랜 대표 이미지 영역]</p>
            </header>
          )}

                              {/* 동적으로 변하는 콘텐츠 영역 */}
          <main className="flex-grow w-full relative z-10 flex flex-col items-center justify-start p-4 md:p-8">
            {activeView === 'Home' ? (
              <HomeContent />
            ) : activeView === '개요' ? (
              <ClanOverview />
            ) : activeView === '공지사항' ? (
              <NoticeBoard /> 
            ) : activeView === '클랜원별 랭킹' || activeView === '시즌별 랭킹' ? (
              <RankingBoard />
            ) : activeView === '레더 매치' || activeView === '레더 포인트' || activeView === '레더 보상 안내' ? (
              // BY레더시스템의 하위 메뉴들을 누르면 LadderSystem 컴포넌트 출력
              <LadderSystem />
            ) : (
              <PagePlaceholder title={activeView} />
            )}
          </main>
          
        </div>
      );
    }


    // 작성한 React 컴포넌트를 실제 화면(#root)에 렌더링
    ReactDOM.render(<ByClanHome />, document.getElementById('root'));
  </script>
</body>
